<div class="auth-container">
  <div class="glass-card">
    <h2 style="text-align: center; margin-bottom: 8px; font-size: 28px;">Welcome Back</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 32px;">Login to your EatZy account</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" name="email" [(ngModel)]="credentials.email" required placeholder="name@example.com">
      </div>
      
      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="credentials.password" required placeholder="••••••••">
      </div>

      <div *ngIf="error" style="color: var(--primary); font-size: 14px; margin-bottom: 16px;">
        {{ error }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="!loginForm.valid || loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted);">
      Don't have an account? <a routerLink="/auth/register" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create one</a>
    </p>
  </div>
</div>
