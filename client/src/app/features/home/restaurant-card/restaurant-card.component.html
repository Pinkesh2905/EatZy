<div class="restaurant-card" [routerLink]="['/restaurant', restaurant._id]">
  <div class="image-container">
    <img [src]="restaurant.image || 'assets/images/default-food.jpg'" [alt]="restaurant.name">
    <div class="rating-badge">
      <span class="star">★</span> {{ restaurant.rating }}
    </div>
  </div>
  
  <div class="card-content">
    <h3>{{ restaurant.name }}</h3>
    <p class="cuisine">{{ restaurant.cuisine.join(', ') }}</p>
    <div class="card-footer">
      <span class="location">📍 {{ restaurant.location }}</span>
    </div>
  </div>
</div>
